<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Battle ⚔️</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --yellow: #FFD700;
  --red: #E3350D;
  --blue: #2A75BB;
  --green: #3DAE2B;
  --white: #F8F8F8;
  --dark: #1a1a2e;
  --hp-green: #48D035;
  --hp-yellow: #F8D030;
  --hp-red: #F03030;
  --panel-bg: #e8e0c0;
  --panel-border: #8b7355;
  --text-dark: #2c2c2c;
  --shadow: rgba(0,0,0,0.4);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background: #1a1a2e;
}

/* ===== SCREENS ===== */
.screen { display: none; width: 100%; height: 100%; position: absolute; top:0; left:0; }
.screen.active { display: flex; }

/* ===== SELECT SCREEN ===== */
#select-screen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #0d0d2b 0%, #1a1a4e 50%, #0d0d2b 100%);
  position: relative;
  overflow: hidden;
}

#select-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(42,117,187,0.08) 0%, transparent 60%);
}

.stars {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--d, 3s) var(--delay, 0s) infinite alternate;
}
@keyframes twinkle { 0%{opacity:0.2} 100%{opacity:1} }

.select-title {
  font-size: clamp(16px, 3vw, 28px);
  color: var(--yellow);
  text-shadow: 3px 3px 0 #8B6914, 0 0 20px rgba(255,215,0,0.5);
  margin-bottom: 8px;
  letter-spacing: 2px;
  animation: float 3s ease-in-out infinite;
  position: relative; z-index: 1;
}
.select-subtitle {
  font-size: clamp(8px, 1.5vw, 12px);
  color: #aaa;
  margin-bottom: 40px;
  position: relative; z-index: 1;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

.pokemon-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  max-width: 600px;
  width: 90%;
  position: relative; z-index: 1;
}

.pokemon-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 20px 16px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}
.pokemon-card::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--color);
  opacity: 0;
  transition: opacity 0.2s;
}
.pokemon-card:hover::before, .pokemon-card.selected::before { opacity: 0.15; }
.pokemon-card:hover { transform: translateY(-4px) scale(1.02); border-color: var(--color); box-shadow: 0 8px 24px var(--color-shadow); }
.pokemon-card.selected { border-color: var(--color); box-shadow: 0 0 0 3px var(--color), 0 8px 24px var(--color-shadow); }

.card-sprite {
  font-size: 52px;
  display: block;
  margin-bottom: 8px;
  position: relative; z-index: 1;
  filter: drop-shadow(0 4px 8px var(--color-shadow));
  transition: transform 0.2s;
}
.pokemon-card:hover .card-sprite { transform: scale(1.1) rotate(-5deg); }

.card-name {
  font-size: 10px;
  color: white;
  display: block;
  margin-bottom: 4px;
  position: relative; z-index: 1;
}
.card-type {
  font-size: 8px;
  color: var(--color);
  display: block;
  position: relative; z-index: 1;
}
.card-stats {
  margin-top: 8px;
  font-size: 7px;
  color: rgba(255,255,255,0.6);
  position: relative; z-index: 1;
}

.start-btn {
  margin-top: 30px;
  padding: 14px 32px;
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  background: var(--yellow);
  color: #1a1a2e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  position: relative; z-index: 1;
  box-shadow: 0 4px 0 #8B6914, 0 0 20px rgba(255,215,0,0.3);
  transition: all 0.1s;
  animation: pulse-btn 2s ease-in-out infinite;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #8B6914, 0 0 30px rgba(255,215,0,0.5); }
.start-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8B6914; }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }
@keyframes pulse-btn { 0%,100%{box-shadow:0 4px 0 #8B6914, 0 0 20px rgba(255,215,0,0.3)} 50%{box-shadow:0 4px 0 #8B6914, 0 0 40px rgba(255,215,0,0.6)} }

/* ===== BATTLE SCREEN ===== */
#battle-screen {
  flex-direction: column;
  background: #000;
  position: relative;
}

/* Battle Field */
.battle-field {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: 
    linear-gradient(180deg, #87CEEB 0%, #87CEEB 55%, #7BC67A 55%, #7BC67A 65%, #5a8f50 65%, #5a8f50 100%);
  min-height: 0;
}

/* Ground platforms */
.battle-field::before {
  content: '';
  position: absolute;
  bottom: 35%;
  left: 5%;
  width: 40%;
  height: 18%;
  background: radial-gradient(ellipse, rgba(139,101,8,0.4) 0%, transparent 70%);
  border-radius: 50%;
}
.battle-field::after {
  content: '';
  position: absolute;
  bottom: 50%;
  right: 5%;
  width: 35%;
  height: 16%;
  background: radial-gradient(ellipse, rgba(139,101,8,0.4) 0%, transparent 70%);
  border-radius: 50%;
}

/* Clouds */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.8);
  border-radius: 50px;
  animation: drift var(--speed) linear infinite;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
}
@keyframes drift { from{transform:translateX(-150%)} to{transform:translateX(110vw)} }

/* HP Panels */
.hp-panel {
  position: absolute;
  background: var(--panel-bg);
  border: 3px solid var(--panel-border);
  border-radius: 8px;
  padding: 10px 14px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  min-width: 200px;
  z-index: 10;
}
.hp-panel.enemy { top: 8%; left: 5%; }
.hp-panel.player { bottom: 38%; right: 5%; }

.hp-name {
  font-size: 10px;
  color: var(--text-dark);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.hp-level {
  font-size: 7px;
  color: #666;
  margin-left: auto;
}
.hp-label {
  font-size: 8px;
  color: var(--text-dark);
  margin-bottom: 3px;
  display: flex;
  justify-content: space-between;
}
.hp-track {
  height: 10px;
  background: #555;
  border-radius: 5px;
  overflow: hidden;
  border: 2px solid #333;
  margin-bottom: 4px;
}
.hp-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease, background 0.5s;
  background: var(--hp-green);
}
.hp-numbers {
  font-size: 8px;
  color: var(--text-dark);
  text-align: right;
}

/* Pokemon sprites */
.pokemon-sprite {
  position: absolute;
  font-size: clamp(60px, 10vw, 100px);
  line-height: 1;
  cursor: default;
  user-select: none;
  filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.4));
  transition: transform 0.3s;
  z-index: 5;
}
.pokemon-sprite.enemy {
  top: 15%;
  right: 10%;
  transform: scaleX(-1);
}
.pokemon-sprite.player {
  bottom: 38%;
  left: 8%;
}

/* Animations */
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-10px)}
  40%{transform:translateX(10px)}
  60%{transform:translateX(-8px)}
  80%{transform:translateX(8px)}
}
@keyframes shake-enemy {
  0%,100%{transform:scaleX(-1) translateX(0)}
  20%{transform:scaleX(-1) translateX(-10px)}
  40%{transform:scaleX(-1) translateX(10px)}
  60%{transform:scaleX(-1) translateX(-8px)}
  80%{transform:scaleX(-1) translateX(8px)}
}
@keyframes attack-lunge {
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(60px)}
}
@keyframes attack-lunge-enemy {
  0%,100%{transform:scaleX(-1) translateX(0)}
  50%{transform:scaleX(-1) translateX(-60px)}
}
@keyframes faint {
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(60px)}
}
@keyframes faint-enemy {
  0%{opacity:1;transform:scaleX(-1) translateY(0)}
  100%{opacity:0;transform:scaleX(-1) translateY(60px)}
}

.pokemon-sprite.enemy.shake { animation: shake-enemy 0.4s; }
.pokemon-sprite.player.shake { animation: shake 0.4s; }
.pokemon-sprite.player.attack { animation: attack-lunge 0.35s ease-in-out; }
.pokemon-sprite.enemy.attack { animation: attack-lunge-enemy 0.35s ease-in-out; }
.pokemon-sprite.player.faint { animation: faint 0.6s forwards; }
.pokemon-sprite.enemy.faint { animation: faint-enemy 0.6s forwards; }

/* Damage popup */
.damage-popup {
  position: absolute;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(14px, 3vw, 22px);
  font-weight: bold;
  pointer-events: none;
  z-index: 100;
  animation: popup 1.2s forwards;
}
.damage-popup.player-dmg { color: #FF4444; text-shadow: 2px 2px 0 #800; right: 15%; bottom: 52%; }
.damage-popup.enemy-dmg  { color: #FF4444; text-shadow: 2px 2px 0 #800; left: 15%; top: 25%; }
@keyframes popup {
  0%{opacity:1;transform:translateY(0) scale(1.2)}
  70%{opacity:1;transform:translateY(-40px) scale(1)}
  100%{opacity:0;transform:translateY(-55px) scale(0.8)}
}

/* Skill effect overlay */
.skill-effect {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
}
.skill-effect.flash {
  animation: flash-anim 0.3s;
}
@keyframes flash-anim {
  0%{opacity:0} 30%{opacity:0.6} 100%{opacity:0}
}

/* Particle effects */
.particle {
  position: absolute;
  pointer-events: none;
  z-index: 60;
  font-size: clamp(16px, 2.5vw, 24px);
  animation: particle-fly var(--dur, 0.8s) var(--delay,0s) forwards;
}
@keyframes particle-fly {
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3)}
}

/* ===== BATTLE UI PANEL ===== */
.battle-ui {
  background: var(--panel-bg);
  border-top: 4px solid var(--panel-border);
  padding: 12px;
  flex-shrink: 0;
  min-height: 160px;
}

.battle-message-box {
  background: white;
  border: 3px solid var(--panel-border);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: clamp(9px, 1.5vw, 11px);
  color: var(--text-dark);
  min-height: 52px;
  line-height: 1.8;
  margin-bottom: 10px;
  position: relative;
}
.battle-message-box .cursor {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--text-dark);
  margin-left: 4px;
  animation: blink 0.7s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.skills-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.skill-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 1.2vw, 9px);
  padding: 10px 8px;
  border: 3px solid;
  border-radius: 6px;
  cursor: pointer;
  background: var(--panel-bg);
  color: var(--text-dark);
  text-align: left;
  transition: all 0.1s;
  position: relative;
  overflow: hidden;
}
.skill-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 4px 0 var(--btn-shadow);
}
.skill-btn:active:not(:disabled) { transform: translateY(1px); box-shadow: 0 1px 0 var(--btn-shadow); }
.skill-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.skill-btn .skill-name { display: block; margin-bottom: 3px; }
.skill-btn .skill-pp  { font-size: 6px; color: #666; }

/* Type colors */
.type-electric { --btn-color:#F8D030; --btn-shadow:#a88c00; border-color:#F8D030; }
.type-fire     { --btn-color:#F08030; --btn-shadow:#a05000; border-color:#F08030; }
.type-water    { --btn-color:#6890F0; --btn-shadow:#2040b0; border-color:#6890F0; }
.type-grass    { --btn-color:#78C850; --btn-shadow:#3a8020; border-color:#78C850; }
.type-normal   { --btn-color:#A8A878; --btn-shadow:#6a6a40; border-color:#A8A878; }
.type-psychic  { --btn-color:#F85888; --btn-shadow:#b02050; border-color:#F85888; }
.type-ice      { --btn-color:#98D8D8; --btn-shadow:#4090a0; border-color:#98D8D8; }
.type-dragon   { --btn-color:#7038F8; --btn-shadow:#3000b0; border-color:#7038F8; }

/* ===== WIN/LOSE OVERLAY ===== */
.result-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(4px);
}
.result-overlay.show { display: flex; }

.result-text {
  font-size: clamp(24px, 6vw, 48px);
  animation: result-pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  margin-bottom: 20px;
  text-align: center;
}
.result-text.win  { color: var(--yellow); text-shadow: 4px 4px 0 #8B6914, 0 0 40px rgba(255,215,0,0.8); }
.result-text.lose { color: var(--red);    text-shadow: 4px 4px 0 #800, 0 0 40px rgba(200,0,0,0.8); }
@keyframes result-pop { 0%{transform:scale(0) rotate(-10deg)} 100%{transform:scale(1) rotate(0)} }

.result-sub {
  font-size: clamp(8px, 1.5vw, 12px);
  color: rgba(255,255,255,0.7);
  margin-bottom: 30px;
  text-align: center;
}

.result-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.result-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(9px, 1.5vw, 12px);
  padding: 12px 24px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.1s;
  box-shadow: 0 4px 0;
}
.result-btn.replay { background: var(--yellow); color: #1a1a2e; box-shadow-color: #8B6914; }
.result-btn.select { background: var(--blue); color: white; box-shadow-color: #1a3a80; }
.result-btn:hover { transform: translateY(-2px); }
.result-btn:active { transform: translateY(2px); }

/* Responsive */
@media (max-width: 480px) {
  .hp-panel { min-width: 150px; padding: 8px 10px; }
  .battle-ui { min-height: 140px; padding: 8px; }
  .pokemon-sprite { font-size: 56px; }
  .pokemon-sprite.enemy { top: 10%; right: 5%; }
  .pokemon-sprite.player { bottom: 36%; left: 3%; }
}

/* Loading */
.loading-bar-wrap {
  width: 200px;
  height: 12px;
  background: rgba(255,255,255,0.15);
  border-radius: 6px;
  overflow: hidden;
  margin-top: 16px;
  position: relative; z-index: 1;
}
.loading-bar {
  height: 100%;
  background: var(--yellow);
  border-radius: 6px;
  animation: load 1s ease-out forwards;
}
@keyframes load { from{width:0} to{width:100%} }
</style>
</head>
<body>

<!-- SELECT SCREEN -->
<div id="select-screen" class="screen active">
  <div class="stars" id="stars"></div>
  <div class="select-title">⚔️ POKEMON BATTLE</div>
  <div class="select-subtitle">Chọn Pokemon của bạn!</div>
  <div class="pokemon-grid" id="pokemon-grid"></div>
  <button class="start-btn" id="start-btn" disabled>BATTLE START!</button>
</div>

<!-- BATTLE SCREEN -->
<div id="battle-screen" class="screen">
  <div class="battle-field" id="battle-field">
    <!-- Clouds -->
    <div class="cloud" style="width:80px;height:24px;top:12%;left:-10%;--speed:18s;opacity:0.7">
      <div style="width:40px;height:40px;top:-20px;left:10px;background:rgba(255,255,255,0.8);border-radius:50%;position:absolute"></div>
      <div style="width:28px;height:28px;top:-14px;left:36px;background:rgba(255,255,255,0.8);border-radius:50%;position:absolute"></div>
    </div>
    <div class="cloud" style="width:60px;height:18px;top:22%;left:-10%;--speed:25s;animation-delay:-8s;opacity:0.5">
      <div style="width:30px;height:30px;top:-15px;left:8px;background:rgba(255,255,255,0.8);border-radius:50%;position:absolute"></div>
    </div>

    <!-- HP Panels -->
    <div class="hp-panel enemy" id="enemy-panel">
      <div class="hp-name">
        <span id="enemy-name">CHARMANDER</span>
        <span class="hp-level" id="enemy-level">Lv.30</span>
      </div>
      <div class="hp-label"><span>HP</span></div>
      <div class="hp-track">
        <div class="hp-bar" id="enemy-hp-bar" style="width:100%"></div>
      </div>
      <div class="hp-numbers" id="enemy-hp-numbers">80/80</div>
    </div>

    <div class="hp-panel player" id="player-panel">
      <div class="hp-name">
        <span id="player-name">PIKACHU</span>
        <span class="hp-level" id="player-level">Lv.30</span>
      </div>
      <div class="hp-label"><span>HP</span></div>
      <div class="hp-track">
        <div class="hp-bar" id="player-hp-bar" style="width:100%"></div>
      </div>
      <div class="hp-numbers" id="player-hp-numbers">80/80</div>
    </div>

    <!-- Pokemon Sprites -->
    <div class="pokemon-sprite enemy" id="enemy-sprite">🐉</div>
    <div class="pokemon-sprite player" id="player-sprite">⚡</div>

    <!-- Skill effect flash -->
    <div class="skill-effect" id="skill-effect"></div>

    <!-- Result overlay -->
    <div class="result-overlay" id="result-overlay">
      <div class="result-text" id="result-text">YOU WIN!</div>
      <div class="result-sub" id="result-sub">Tuyệt vời! Bạn là Trainer giỏi!</div>
      <div class="result-btns">
        <button class="result-btn replay" id="replay-btn">🔄 CHƠI LẠI</button>
        <button class="result-btn select" id="select-again-btn">🎮 CHỌN LẠI</button>
      </div>
    </div>
  </div>

  <!-- Battle UI -->
  <div class="battle-ui">
    <div class="battle-message-box" id="message-box">
      <span id="message-text">Chọn skill để tấn công!</span>
      <span class="cursor" id="msg-cursor"></span>
    </div>
    <div class="skills-grid" id="skills-grid"></div>
  </div>
</div>

<script>
// ===== DATA =====
const POKEMON_DATA = {

      { name: 'Thunder', emoji: '🌩️', type: 'electric', damage: [50,80], pp: 10, effect: '#FFD700' },

  },
  blastoise: {
    name: 'BLASTOISE', emoji: '💧', hp: 105, level: 36,
    color: '#6890F0',
    skills: [
      { name: 'Hydro Pump', emoji: '💧', type: 'water', damage: [45,75], pp: 5, effect: '#1E90FF' },
      { name: 'Surf', emoji: '🌊', type: 'water', damage: [35,55], pp: 15, effect: '#4169E1' },
      { name: 'Ice Beam', emoji: '🧊', type: 'ice', damage: [40,60], pp: 10, effect: '#98D8D8' },
      { name: 'Rapid Spin', emoji: '🌀', type: 'normal', damage: [20,35], pp: 40, effect: '#E0E0E0' },
    ]
  },
  venusaur: {
    name: 'VENUSAUR', emoji: '🌿', hp: 100, level: 36,
    color: '#78C850',
    skills: [
      { name: 'Solar Beam', emoji: '☀️', type: 'grass', damage: [45,75], pp: 10, effect: '#FFD700' },
      { name: 'Vine Whip', emoji: '🌿', type: 'grass', damage: [25,40], pp: 25, effect: '#78C850' },
      { name: 'Petal Dance', emoji: '🌸', type: 'grass', damage: [40,70], pp: 10, effect: '#FF69B4' },
      { name: 'Sludge Bomb', emoji: '☣️', type: 'psychic', damage: [35,55], pp: 10, effect: '#9932CC' },
    ]
  }
};

const ENEMY_POOL = [
  { name: 'CHARMANDER', emoji: '🦎', hp: 80, level: 30,
    skills: [
      { name: 'Ember', emoji: '🔥', type: 'fire', damage: [25,40], pp: 25, effect: '#FF4500' },
      { name: 'Scratch', emoji: '🐾', type: 'normal', damage: [15,30], pp: 35, effect: '#E0E0E0' },
      { name: 'Flamethrower', emoji: '💥', type: 'fire', damage: [38,58], pp: 15, effect: '#FF6600' },
      { name: 'Dragon Rage', emoji: '🐉', type: 'dragon', damage: [30,48], pp: 10, effect: '#7038F8' },
    ]
  },
  { name: 'SQUIRTLE', emoji: '🐢', hp: 85, level: 28,
    skills: [
      { name: 'Water Gun', emoji: '💧', type: 'water', damage: [28,42], pp: 25, effect: '#1E90FF' },
      { name: 'Tackle', emoji: '💥', type: 'normal', damage: [18,32], pp: 35, effect: '#E0E0E0' },
      { name: 'Bite', emoji: '😬', type: 'normal', damage: [30,45], pp: 25, effect: '#808080' },
      { name: 'Bubble Beam', emoji: '🫧', type: 'water', damage: [35,52], pp: 20, effect: '#4169E1' },
    ]
  },
  { name: 'GENGAR', emoji: '👻', hp: 95, level: 34,
    skills: [
      { name: 'Shadow Ball', emoji: '👻', type: 'psychic', damage: [40,65], pp: 15, effect: '#4B0082' },
      { name: 'Lick', emoji: '👅', type: 'normal', damage: [15,25], pp: 30, effect: '#E0E0E0' },
      { name: 'Hypnosis', emoji: '😴', type: 'psychic', damage: [25,40], pp: 20, effect: '#9932CC' },
      { name: 'Sludge Bomb', emoji: '☣️', type: 'psychic', damage: [38,58], pp: 10, effect: '#9932CC' },
    ]
  },
  { name: 'GEODUDE', emoji: '🪨', hp: 75, level: 25,
    skills: [
      { name: 'Rock Throw', emoji: '🪨', type: 'normal', damage: [30,45], pp: 15, effect: '#808080' },
      { name: 'Tackle', emoji: '💥', type: 'normal', damage: [20,35], pp: 35, effect: '#E0E0E0' },
      { name: 'Rollout', emoji: '⚫', type: 'normal', damage: [22,38], pp: 20, effect: '#808080' },
      { name: 'Magnitude', emoji: '🌋', type: 'normal', damage: [28,50], pp: 30, effect: '#8B4513' },
    ]
  },
];

// ===== STATE =====
let state = {
  player: null, enemy: null,
  playerHP: 0, enemyHP: 0,
  playerMaxHP: 0, enemyMaxHP: 0,
  playerSkillPP: [],
  turn: 'player', // 'player' | 'enemy' | 'busy'
  selectedPokemon: null,
};

// ===== STARS =====
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:-${Math.random()*4}s;opacity:${0.3+Math.random()*0.7}`;
    container.appendChild(s);
  }
}

// ===== SELECT SCREEN =====
function buildSelectScreen() {
  const grid = document.getElementById('pokemon-grid');
  grid.innerHTML = '';
  Object.entries(POKEMON_DATA).forEach(([key, p]) => {
    const card = document.createElement('div');
    card.className = 'pokemon-card';
    card.style.setProperty('--color', p.color);
    card.style.setProperty('--color-shadow', p.color + '66');
    card.innerHTML = `
      <span class="card-sprite">${p.emoji}</span>
      <span class="card-name">${p.name}</span>
      <span class="card-type">${p.skills[0].type.toUpperCase()}</span>
      <div class="card-stats">HP: ${p.hp} | Lv.${p.level}</div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.pokemon-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      state.selectedPokemon = key;
      document.getElementById('start-btn').disabled = false;
    });
    grid.appendChild(card);
  });
}

document.getElementById('start-btn').addEventListener('click', () => {
  if (!state.selectedPokemon) return;
  startBattle();
});

// ===== START BATTLE =====
function startBattle() {
  const playerData = POKEMON_DATA[state.selectedPokemon];
  const enemyData = ENEMY_POOL[Math.floor(Math.random() * ENEMY_POOL.length)];

  state.player = playerData;
  state.enemy = enemyData;
  state.playerHP = playerData.hp;
  state.enemyHP = enemyData.hp;
  state.playerMaxHP = playerData.hp;
  state.enemyMaxHP = enemyData.hp;
  state.playerSkillPP = playerData.skills.map(s => s.pp);
  state.turn = 'player';

  // Update UI
  document.getElementById('player-sprite').textContent = playerData.emoji;
  document.getElementById('enemy-sprite').textContent = enemyData.emoji;
  document.getElementById('player-name').textContent = playerData.name;
  document.getElementById('enemy-name').textContent = enemyData.name;
  document.getElementById('player-level').textContent = `Lv.${playerData.level}`;
  document.getElementById('enemy-level').textContent = `Lv.${enemyData.level}`;

  updateHPBars();
  buildSkillButtons();
  setMessage(`${enemyData.name} xuất hiện! Hãy chọn skill!`);

  // Show battle screen
  document.getElementById('select-screen').classList.remove('active');
  document.getElementById('battle-screen').classList.add('active');
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('player-sprite').style.opacity = '';
  document.getElementById('enemy-sprite').style.opacity = '';
  document.getElementById('player-sprite').className = 'pokemon-sprite player';
  document.getElementById('enemy-sprite').className = 'pokemon-sprite enemy';
}

// ===== HP BARS =====
function updateHPBars() {
  const pPct = Math.max(0, state.playerHP / state.playerMaxHP * 100);
  const ePct = Math.max(0, state.enemyHP / state.enemyMaxHP * 100);

  const pb = document.getElementById('player-hp-bar');
  const eb = document.getElementById('enemy-hp-bar');

  pb.style.width = pPct + '%';
  eb.style.width = ePct + '%';

  const getColor = p => p > 50 ? 'var(--hp-green)' : p > 20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
  pb.style.background = getColor(pPct);
  eb.style.background = getColor(ePct);

  document.getElementById('player-hp-numbers').textContent = `${Math.max(0,state.playerHP)}/${state.playerMaxHP}`;
  document.getElementById('enemy-hp-numbers').textContent = `${Math.max(0,state.enemyHP)}/${state.enemyMaxHP}`;
}

// ===== SKILL BUTTONS =====
function buildSkillButtons() {
  const grid = document.getElementById('skills-grid');
  grid.innerHTML = '';
  state.player.skills.forEach((skill, i) => {
    const btn = document.createElement('button');
    btn.className = `skill-btn type-${skill.type}`;
    btn.id = `skill-btn-${i}`;
    btn.innerHTML = `<span class="skill-name">${skill.emoji} ${skill.name}</span><span class="skill-pp">PP ${state.playerSkillPP[i]}/${skill.pp}</span>`;
    btn.addEventListener('click', () => playerAttack(i));
    grid.appendChild(btn);
  });
}

function updateSkillButtons() {
  state.player.skills.forEach((skill, i) => {
    const btn = document.getElementById(`skill-btn-${i}`);
    if (btn) {
      btn.querySelector('.skill-pp').textContent = `PP ${state.playerSkillPP[i]}/${skill.pp}`;
      btn.disabled = state.turn !== 'player' || state.playerSkillPP[i] <= 0;
    }
  });
}

function setSkillsDisabled(disabled) {
  state.player.skills.forEach((_, i) => {
    const btn = document.getElementById(`skill-btn-${i}`);
    if (btn) btn.disabled = disabled || state.playerSkillPP[i] <= 0;
  });
}

// ===== MESSAGE =====
function setMessage(text) {
  document.getElementById('message-text').textContent = text;
  const cursor = document.getElementById('msg-cursor');
  cursor.style.display = 'inline-block';
}

// ===== DAMAGE & ANIMATION =====
function randomBetween(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function showDamagePopup(damage, isPlayer) {
  const field = document.getElementById('battle-field');
  const popup = document.createElement('div');
  popup.className = `damage-popup ${isPlayer ? 'player-dmg' : 'enemy-dmg'}`;
  popup.textContent = `-${damage}`;
  field.appendChild(popup);
  setTimeout(() => popup.remove(), 1300);
}

function flashEffect(color) {
  const el = document.getElementById('skill-effect');
  el.style.background = color;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function spawnParticles(emoji, x, y, count = 5) {
  const field = document.getElementById('battle-field');
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 40 + Math.random() * 60;
    p.style.cssText = `left:${x}%;top:${y}%;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--dur:${0.5+Math.random()*0.5}s;--delay:${Math.random()*0.2}s`;
    p.textContent = emoji;
    field.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function animateSprite(id, cls, duration = 400) {
  return new Promise(res => {
    const el = document.getElementById(id);
    const base = id.includes('enemy') ? 'pokemon-sprite enemy' : 'pokemon-sprite player';
    el.className = base + ' ' + cls;
    setTimeout(() => { el.className = base; res(); }, duration);
  });
}

// ===== PLAYER ATTACK =====
async function playerAttack(skillIndex) {
  if (state.turn !== 'player') return;
  const skill = state.player.skills[skillIndex];
  if (state.playerSkillPP[skillIndex] <= 0) return;

  state.turn = 'busy';
  setSkillsDisabled(true);
  state.playerSkillPP[skillIndex]--;
  updateSkillButtons();

  setMessage(`${state.player.name} dùng ${skill.name}!`);

  // Player lunge
  await animateSprite('player-sprite', 'attack', 350);
  
  // Flash + particles
  flashEffect(skill.effect + '88');
  spawnParticles(skill.emoji, 65, 30, 6);
  
  // Enemy shake
  const dmg = randomBetween(...skill.damage);
  state.enemyHP = Math.max(0, state.enemyHP - dmg);
  showDamagePopup(dmg, false);
  await animateSprite('enemy-sprite', 'shake', 400);
  updateHPBars();

  await delay(600);

  if (state.enemyHP <= 0) {
    await animateSprite('enemy-sprite', 'faint', 650);
    await delay(400);
    endBattle(true);
    return;
  }

  // Enemy turn
  setMessage(`${state.enemy.name} chuẩn bị phản công...`);
  await delay(900);
  await enemyAttack();
}

// ===== ENEMY ATTACK =====
async function enemyAttack() {
  // AI picks random skill
  const availSkills = state.enemy.skills;
  const skill = availSkills[Math.floor(Math.random() * availSkills.length)];

  setMessage(`${state.enemy.name} dùng ${skill.name}!`);

  await animateSprite('enemy-sprite', 'attack', 350);

  flashEffect(skill.effect + '88');
  spawnParticles(skill.emoji, 25, 65, 6);

  const dmg = randomBetween(...skill.damage);
  state.playerHP = Math.max(0, state.playerHP - dmg);
  showDamagePopup(dmg, true);
  await animateSprite('player-sprite', 'shake', 400);
  updateHPBars();

  await delay(600);

  if (state.playerHP <= 0) {
    await animateSprite('player-sprite', 'faint', 650);
    await delay(400);
    endBattle(false);
    return;
  }

  setMessage(`${state.player.name} còn ${state.playerHP} HP. Chọn skill!`);
  state.turn = 'player';
  setSkillsDisabled(false);
}

// ===== END BATTLE =====
function endBattle(playerWon) {
  state.turn = 'busy';
  const overlay = document.getElementById('result-overlay');
  const text = document.getElementById('result-text');
  const sub = document.getElementById('result-sub');

  if (playerWon) {
    text.textContent = '🏆 YOU WIN!';
    text.className = 'result-text win';
    sub.textContent = `${state.player.name} chiến thắng! Xuất sắc, Trainer!`;
  } else {
    text.textContent = '💀 YOU LOSE...';
    text.className = 'result-text lose';
    sub.textContent = `${state.player.name} đã ngã xuống... Hãy thử lại!`;
  }
  overlay.classList.add('show');
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ===== BUTTONS =====
document.getElementById('replay-btn').addEventListener('click', () => {
  startBattle();
});
document.getElementById('select-again-btn').addEventListener('click', () => {
  document.getElementById('battle-screen').classList.remove('active');
  document.getElementById('select-screen').classList.add('active');
  state.selectedPokemon = null;
  document.getElementById('start-btn').disabled = true;
  document.querySelectorAll('.pokemon-card').forEach(c => c.classList.remove('selected'));
});

// ===== INIT =====
createStars();
buildSelectScreen();
</script>
</body>
