<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d2b">
<title>⚔️ Pokemon Battle — 30 Cửa Ải</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --yellow:#FFD700;--red:#E3350D;--blue:#2A75BB;--purple:#7038F8;
  --hp-green:#48D035;--hp-yellow:#F8D030;--hp-red:#F03030;
  --panel:#EDE8C8;--border:#8b7355;--dark:#1e1e1e;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html{height:100%;overflow:hidden;position:fixed;width:100%}
body{height:100%;width:100%;overflow:hidden;font-family:'Press Start 2P',monospace;background:#0d0d2b;display:flex;flex-direction:column}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;width:100%;height:100%;position:absolute;top:0;left:0}
.screen.active{display:flex}

/* ════════════════════════════════
   SELECT SCREEN
════════════════════════════════ */
#select-screen{
  background:linear-gradient(180deg,#0d0d2b 0%,#1a1a4e 50%,#0d0d2b 100%);
  align-items:center;justify-content:flex-start;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:calc(var(--sat)+16px) 14px calc(var(--sab)+16px);
  gap:0;
}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) var(--delay,0s) infinite alternate}
@keyframes twinkle{0%{opacity:.1}100%{opacity:1}}

.sel-title{position:relative;z-index:1;font-size:clamp(12px,3.5vw,20px);color:var(--yellow);text-shadow:3px 3px 0 #8B6914,0 0 20px rgba(255,215,0,.5);animation:float 3s ease-in-out infinite;text-align:center;margin:10px 0 4px}
.sel-sub{position:relative;z-index:1;font-size:clamp(6px,2vw,9px);color:#aaa;text-align:center;margin-bottom:14px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* Stage progress bar */
.stage-bar{position:relative;z-index:1;width:100%;max-width:480px;margin-bottom:14px}
.stage-label{font-size:8px;color:var(--yellow);margin-bottom:6px;text-align:center}
.stage-track{height:12px;background:rgba(255,255,255,.1);border-radius:6px;border:2px solid rgba(255,255,255,.2);overflow:hidden;position:relative}
.stage-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF8C00);border-radius:4px;transition:width .5s ease}
.stage-dots{display:flex;justify-content:space-between;margin-top:4px;flex-wrap:wrap;gap:2px}
.sdot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.2);font-size:5px;display:flex;align-items:center;justify-content:center;cursor:default}
.sdot.done{background:var(--yellow);border-color:var(--yellow);color:#000}
.sdot.current{background:rgba(255,100,0,.6);border-color:#FF8C00;animation:pulse-dot .8s infinite alternate}
.sdot.locked{background:rgba(255,255,255,.05)}
@keyframes pulse-dot{0%{box-shadow:0 0 0 0 rgba(255,140,0,.6)}100%{box-shadow:0 0 0 4px rgba(255,140,0,0)}}

/* Pokemon grid */
.poke-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:480px;position:relative;z-index:1}
@media(min-width:500px){.poke-grid{grid-template-columns:repeat(4,1fr)}}

.poke-card{background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.04));border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:14px 8px 10px;cursor:pointer;text-align:center;transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;overflow:hidden;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:manipulation}
.poke-card::after{content:'';position:absolute;inset:0;background:var(--c);opacity:0;transition:opacity .2s;border-radius:10px}
.poke-card.sel::after{opacity:.18}
.poke-card.sel{border-color:var(--c);box-shadow:0 0 0 3px var(--c)}
.poke-card:active{transform:scale(.95)}
.pc-spr{font-size:36px;display:block;margin-bottom:4px;position:relative;z-index:1}
.pc-name{font-size:7px;color:#fff;display:block;margin-bottom:2px;position:relative;z-index:1;line-height:1.3}
.pc-type{font-size:6px;color:var(--c);display:block;position:relative;z-index:1}
.pc-stat{font-size:5px;color:rgba(255,255,255,.45);margin-top:3px;position:relative;z-index:1}

.start-btn{position:relative;z-index:1;margin-top:16px;width:100%;max-width:280px;padding:14px;font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.5vw,12px);background:var(--yellow);color:#1a1a2e;border:none;border-radius:8px;cursor:pointer;box-shadow:0 5px 0 #8B6914;touch-action:manipulation;min-height:50px;animation:pulse-btn 2s infinite}
.start-btn:disabled{opacity:.3;animation:none}
.start-btn:active:not(:disabled){transform:translateY(3px);box-shadow:0 2px 0 #8B6914}
@keyframes pulse-btn{0%,100%{box-shadow:0 5px 0 #8B6914,0 0 14px rgba(255,215,0,.25)}50%{box-shadow:0 5px 0 #8B6914,0 0 28px rgba(255,215,0,.5)}}

/* ════════════════════════════════
   BATTLE SCREEN
════════════════════════════════ */
#battle-screen{background:#000}

.battle-field{position:relative;overflow:hidden;flex-shrink:0;height:52vh;background:linear-gradient(180deg,#5ab0e8 0%,#87CEEB 44%,#7BC67A 44%,#7BC67A 62%,#5a8f50 62%,#5a8f50 100%)}
.battle-field::before{content:'';position:absolute;bottom:38%;left:3%;width:42%;height:16%;background:radial-gradient(ellipse,rgba(0,0,0,.15) 0%,transparent 70%);border-radius:50%}
.battle-field::after{content:'';position:absolute;bottom:50%;right:3%;width:36%;height:14%;background:radial-gradient(ellipse,rgba(0,0,0,.15) 0%,transparent 70%);border-radius:50%}

/* stage badge on field */
.stage-badge{position:absolute;top:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);border:2px solid var(--yellow);border-radius:20px;padding:3px 10px;font-size:7px;color:var(--yellow);z-index:20;white-space:nowrap}

.cloud{position:absolute;background:rgba(255,255,255,.8);border-radius:50px;animation:drift var(--sp) linear infinite}
@keyframes drift{from{transform:translateX(-120%)}to{transform:translateX(110vw)}}

/* HP panels */
.hp-panel{position:absolute;background:var(--panel);border:3px solid var(--border);border-radius:8px;padding:7px 10px;box-shadow:3px 3px 0 rgba(0,0,0,.3);z-index:10;min-width:clamp(130px,40vw,210px)}
.hp-panel.enemy{top:6%;left:4%}
.hp-panel.player{bottom:36%;right:4%}
.hp-name{font-size:clamp(6px,2vw,9px);color:var(--dark);display:flex;align-items:center;gap:4px;margin-bottom:4px}
.hp-lv{font-size:5px;color:#666;margin-left:auto}
.hp-track{height:8px;background:#555;border-radius:4px;overflow:hidden;border:2px solid #333;margin-bottom:3px}
.hp-bar{height:100%;border-radius:2px;transition:width .5s,background .5s;background:var(--hp-green)}
.hp-num{font-size:clamp(5px,1.6vw,7px);color:var(--dark);text-align:right}

/* sprites */
.poke-spr{position:absolute;font-size:clamp(48px,12vw,86px);line-height:1;user-select:none;filter:drop-shadow(3px 6px 8px rgba(0,0,0,.4));z-index:5}
.poke-spr.enemy{top:7%;right:5%;transform:scaleX(-1)}
.poke-spr.player{bottom:33%;left:4%}

/* animations */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
@keyframes shake-e{0%,100%{transform:scaleX(-1) translateX(0)}20%{transform:scaleX(-1) translateX(-9px)}40%{transform:scaleX(-1) translateX(9px)}60%{transform:scaleX(-1) translateX(-7px)}80%{transform:scaleX(-1) translateX(7px)}}
@keyframes lunge{0%,100%{transform:translateX(0)}50%{transform:translateX(48px)}}
@keyframes lunge-e{0%,100%{transform:scaleX(-1)}50%{transform:scaleX(-1) translateX(-48px)}}
@keyframes faint{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(48px)}}
@keyframes faint-e{0%{opacity:1;transform:scaleX(-1) translateY(0)}100%{opacity:0;transform:scaleX(-1) translateY(48px)}}
.poke-spr.enemy.shake{animation:shake-e .4s}
.poke-spr.player.shake{animation:shake .4s}
.poke-spr.player.atk{animation:lunge .35s ease-in-out}
.poke-spr.enemy.atk{animation:lunge-e .35s ease-in-out}
.poke-spr.player.faint{animation:faint .6s forwards}
.poke-spr.enemy.faint{animation:faint-e .6s forwards}

/* damage */
.dmg-pop{position:absolute;font-size:clamp(14px,3.5vw,20px);pointer-events:none;z-index:100;animation:popup 1.2s forwards;font-family:'Press Start 2P',monospace}
.dmg-pop.e{color:#FF3333;text-shadow:2px 2px 0 #800;right:12%;top:20%}
.dmg-pop.p{color:#FF3333;text-shadow:2px 2px 0 #800;left:12%;bottom:48%}
@keyframes popup{0%{opacity:1;transform:translateY(0) scale(1.2)}70%{opacity:1;transform:translateY(-32px) scale(1)}100%{opacity:0;transform:translateY(-46px) scale(.8)}}

/* critical */
.crit-pop{position:absolute;font-size:clamp(9px,2.5vw,13px);color:#FFD700;text-shadow:1px 1px 0 #8B6914;pointer-events:none;z-index:101;animation:crit-fly 1s forwards;font-family:'Press Start 2P',monospace}
.crit-pop.e{right:18%;top:30%}
.crit-pop.p{left:18%;bottom:56%}
@keyframes crit-fly{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-24px)}}

/* flash / particle */
.skill-fx{position:absolute;inset:0;pointer-events:none;z-index:50;opacity:0}
.skill-fx.flash{animation:flasha .3s}
@keyframes flasha{0%{opacity:0}30%{opacity:.5}100%{opacity:0}}
.ptcl{position:absolute;pointer-events:none;z-index:60;font-size:clamp(13px,2.5vw,18px);animation:pfly var(--dur,.7s) var(--dly,0s) forwards}
@keyframes pfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.3)}}

/* ─ battle UI ─ */
.battle-ui{flex:1;display:flex;flex-direction:column;background:var(--panel);border-top:4px solid var(--border);padding:8px 10px;padding-bottom:calc(8px + var(--sab));min-height:0;overflow:hidden}
.msg-box{background:#fff;border:3px solid var(--border);border-radius:6px;padding:8px 12px;font-size:clamp(7px,2vw,9px);color:var(--dark);line-height:1.9;min-height:42px;flex-shrink:0;margin-bottom:7px;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.msg-cur{display:inline-block;width:6px;height:6px;background:var(--dark);margin-left:3px;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;flex:1;min-height:0}
.sk-btn{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.6vw,8px);border:3px solid;border-radius:8px;cursor:pointer;background:var(--panel);color:var(--dark);text-align:left;padding:9px 8px;display:flex;flex-direction:column;justify-content:center;touch-action:manipulation;min-height:50px;transition:transform .08s;position:relative;overflow:hidden;-webkit-user-select:none}
.sk-btn:active:not(:disabled){transform:scale(.95)}
.sk-btn:disabled{opacity:.38}
.sk-btn .sn{display:block;margin-bottom:2px}
.sk-btn .sp{font-size:5px;color:#666}
.sk-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.22);opacity:0;transition:opacity .15s}
.sk-btn:active::after{opacity:1}
.type-electric{border-color:#F8D030}
.type-fire{border-color:#F08030}
.type-water{border-color:#6890F0}
.type-grass{border-color:#78C850}
.type-normal{border-color:#A8A878}
.type-psychic{border-color:#F85888}
.type-ice{border-color:#98D8D8}
.type-dragon{border-color:#7038F8}
.type-ghost{border-color:#705898}
.type-dark{border-color:#705848}
.type-steel{border-color:#B8B8D0}
.type-rock{border-color:#B8A038}
.type-ground{border-color:#E0C068}
.type-poison{border-color:#A040A0}
.type-fighting{border-color:#C03028}
.type-flying{border-color:#A890F0}

/* ─ result overlay ─ */
.result-ov{position:absolute;inset:0;background:rgba(0,0,0,.82);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);padding:24px 18px}
.result-ov.show{display:flex}
.res-txt{font-size:clamp(20px,7vw,40px);animation:rpop .5s cubic-bezier(.34,1.56,.64,1);margin-bottom:10px;text-align:center}
.res-txt.win{color:var(--yellow);text-shadow:4px 4px 0 #8B6914,0 0 36px rgba(255,215,0,.8)}
.res-txt.lose{color:#E3350D;text-shadow:4px 4px 0 #800,0 0 36px rgba(200,0,0,.8)}
@keyframes rpop{0%{transform:scale(0) rotate(-10deg)}100%{transform:scale(1) rotate(0)}}
.res-sub{font-size:clamp(6px,2vw,9px);color:rgba(255,255,255,.7);margin-bottom:22px;text-align:center;line-height:2}
.res-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%}
.res-btn{font-family:'Press Start 2P',monospace;font-size:clamp(7px,2vw,10px);padding:12px 16px;border:none;border-radius:8px;cursor:pointer;touch-action:manipulation;min-height:48px;flex:1;max-width:180px;transition:transform .08s}
.res-btn:active{transform:scale(.95)}
.res-btn.next{background:var(--yellow);color:#1a1a2e;box-shadow:0 4px 0 #8B6914}
.res-btn.retry{background:#E3350D;color:#fff;box-shadow:0 4px 0 #800}
.res-btn.sel{background:var(--blue);color:#fff;box-shadow:0 4px 0 #1a3a80}

/* stage clear banner */
.stage-clear{font-size:clamp(9px,2.5vw,13px);color:#fff;background:rgba(0,0,0,.5);padding:6px 14px;border-radius:20px;margin-bottom:14px;text-align:center;letter-spacing:1px}

/* ── STAGE MAP SCREEN ── */
#map-screen{
  background:linear-gradient(180deg,#0d0d2b 0%,#1a1a4e 40%,#0d0d2b 100%);
  align-items:center;justify-content:flex-start;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:calc(var(--sat)+12px) 12px calc(var(--sab)+12px);
}
.map-title{position:relative;z-index:1;font-size:clamp(10px,3vw,16px);color:var(--yellow);text-shadow:2px 2px 0 #8B6914;text-align:center;margin:8px 0}
.map-sub{font-size:7px;color:#aaa;text-align:center;margin-bottom:14px;position:relative;z-index:1}
.map-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;max-width:480px;position:relative;z-index:1}
.map-cell{border:2px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 4px;text-align:center;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;touch-action:manipulation;position:relative}
.map-cell.done{background:rgba(255,215,0,.15);border-color:var(--yellow);cursor:default}
.map-cell.current{background:rgba(255,100,0,.2);border-color:#FF8C00;animation:pulse-cell .8s infinite alternate;cursor:pointer}
.map-cell.locked{background:rgba(255,255,255,.03);opacity:.5;cursor:not-allowed}
@keyframes pulse-cell{0%{box-shadow:0 0 0 0 rgba(255,140,0,.4)}100%{box-shadow:0 0 0 6px rgba(255,140,0,0)}}
.map-cell .mc-num{font-size:6px;color:rgba(255,255,255,.4);margin-bottom:2px}
.map-cell.done .mc-num{color:var(--yellow)}
.map-cell.current .mc-num{color:#FF8C00}
.map-cell .mc-spr{font-size:22px;line-height:1}
.map-cell .mc-name{font-size:5px;color:rgba(255,255,255,.5);margin-top:2px;line-height:1.2}
.map-cell.done .mc-name{color:rgba(255,215,0,.7)}
.mc-check{position:absolute;top:2px;right:4px;font-size:9px}
.mc-boss{position:absolute;top:2px;left:4px;font-size:8px}
.map-play-btn{margin-top:14px;position:relative;z-index:1;width:100%;max-width:260px;padding:13px;font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.5vw,11px);background:var(--yellow);color:#1a1a2e;border:none;border-radius:8px;cursor:pointer;box-shadow:0 4px 0 #8B6914;min-height:48px;touch-action:manipulation;animation:pulse-btn 2s infinite}
.map-play-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #8B6914}
.map-sel-btn{margin-top:8px;position:relative;z-index:1;width:100%;max-width:260px;padding:10px;font-family:'Press Start 2P',monospace;font-size:clamp(7px,2vw,9px);background:transparent;color:#aaa;border:2px solid rgba(255,255,255,.2);border-radius:8px;cursor:pointer;min-height:40px;touch-action:manipulation}

/* ── WIN ALL SCREEN ── */
#win-screen{background:linear-gradient(180deg,#0d0d2b,#1a1a4e);align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px}
.win-trophy{font-size:72px;animation:float 2s ease-in-out infinite}
.win-title{font-size:clamp(14px,4vw,24px);color:var(--yellow);text-shadow:3px 3px 0 #8B6914,0 0 30px rgba(255,215,0,.8);text-align:center;line-height:2}
.win-sub{font-size:8px;color:#aaa;text-align:center;line-height:2}
.win-restart{padding:14px 28px;font-family:'Press Start 2P',monospace;font-size:10px;background:var(--yellow);color:#1a1a2e;border:none;border-radius:8px;cursor:pointer;box-shadow:0 4px 0 #8B6914;min-height:48px;touch-action:manipulation}

/* landscape */
@media(min-width:640px) and (orientation:landscape){
  .battle-field{height:56vh}
  .poke-spr{font-size:84px}
  .skills-grid{grid-template-columns:repeat(4,1fr)}
  .battle-ui{flex-direction:row;gap:8px}
  .msg-box{flex:1;margin-bottom:0}
  .skills-grid{flex:2}
}
</style>
</head>
<body>

<!-- ══ SELECT SCREEN ══ -->
<div id="select-screen" class="screen active">
  <div class="stars" id="stars"></div>
  <div class="sel-title">⚔️ POKEMON BATTLE</div>
  <div class="sel-sub">Chọn Pokemon đồng hành!</div>
  <div class="stage-bar" id="sel-stage-bar">
    <div class="stage-label" id="sel-stage-label">Cửa Ải 1 / 30</div>
    <div class="stage-track"><div class="stage-fill" id="sel-stage-fill" style="width:0%"></div></div>
  </div>
  <div class="poke-grid" id="poke-grid"></div>
  <button class="start-btn" id="start-btn" disabled>⚔️ BẮT ĐẦU!</button>
  <button class="start-btn" id="map-btn" style="margin-top:8px;background:#2A75BB;color:#fff;box-shadow:0 5px 0 #1a3a80;animation:none">🗺️ BẢN ĐỒ</button>
</div>

<!-- ══ MAP SCREEN ══ -->
<div id="map-screen" class="screen">
  <div class="stars"></div>
  <div class="map-title">🗺️ BẢN ĐỒ CỬA ẢI</div>
  <div class="map-sub" id="map-sub">Chọn cửa để xem chi tiết</div>
  <div class="map-grid" id="map-grid"></div>
  <button class="map-play-btn" id="map-play-btn">⚔️ TIẾP TỤC</button>
  <button class="map-sel-btn" id="map-sel-btn">← Đổi Pokemon</button>
</div>

<!-- ══ BATTLE SCREEN ══ -->
<div id="battle-screen" class="screen">
  <div class="battle-field" id="battle-field">
    <div class="stage-badge" id="stage-badge">Cửa 1/30</div>
    <!-- clouds -->
    <div class="cloud" style="width:70px;height:20px;top:9%;left:-10%;--sp:22s;opacity:.7">
      <div style="position:absolute;width:32px;height:32px;top:-16px;left:8px;background:rgba(255,255,255,.8);border-radius:50%"></div>
      <div style="position:absolute;width:22px;height:22px;top:-11px;left:32px;background:rgba(255,255,255,.8);border-radius:50%"></div>
    </div>
    <div class="cloud" style="width:50px;height:14px;top:20%;left:-10%;--sp:30s;animation-delay:-12s;opacity:.5">
      <div style="position:absolute;width:24px;height:24px;top:-12px;left:6px;background:rgba(255,255,255,.8);border-radius:50%"></div>
    </div>
    <!-- enemy HP -->
    <div class="hp-panel enemy">
      <div class="hp-name"><span id="e-name">ENEMY</span><span class="hp-lv" id="e-lv">Lv.1</span></div>
      <div class="hp-track"><div class="hp-bar" id="e-hp-bar"></div></div>
      <div class="hp-num" id="e-hp-num">100/100</div>
    </div>
    <!-- player HP -->
    <div class="hp-panel player">
      <div class="hp-name"><span id="p-name">PLAYER</span><span class="hp-lv" id="p-lv">Lv.35</span></div>
      <div class="hp-track"><div class="hp-bar" id="p-hp-bar"></div></div>
      <div class="hp-num" id="p-hp-num">90/90</div>
    </div>
    <!-- sprites -->
    <div class="poke-spr enemy" id="e-spr">🐉</div>

function getEnemySkillPool(stageIdx){
  if(stageIdx>=25) return SKILL_POOLS.boss;
  if(stageIdx>=15) return SKILL_POOLS.tier4;
  if(stageIdx>=10) return SKILL_POOLS.tier3;
  if(stageIdx>=5)  return SKILL_POOLS.tier2;
  return SKILL_POOLS.tier1;
}
function buildEnemyForStage(idx){
  const base=ALL_ENEMIES[idx];
  const pool=getEnemySkillPool(idx);
  // pick 4 skills
  const shuffled=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(4,pool.length));
  while(shuffled.length<4) shuffled.push(pool[Math.floor(Math.random()*pool.length)]);
  // scale HP with stage
  const hpScale=1+idx*0.15;
  return {...base, hp:Math.round(base.hp*hpScale), maxHP:Math.round(base.hp*hpScale), skills:shuffled};
}

function mkStars(){
  document.querySelectorAll('.stars').forEach(c=>{
    c.innerHTML='';
    for(let i=0;i<60;i++){
      const s=document.createElement('div');
      s.className='star';
      s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:-${Math.random()*5}s`;
      c.appendChild(s);
    }
  });
}

function buildSelect(){
  // stage progress
  const done=G.clearedStages.length;
  $('sel-stage-label').textContent=`Cửa Ải ${Math.min(done+1,30)} / 30 — Đã qua: ${done}`;
  $('sel-stage-fill').style.width=(done/30*100)+'%';

  const g=$('poke-grid'); g.innerHTML='';
  Object.entries(PLAYER_POKEMON).forEach(([key,p])=>{
    const d=document.createElement('div');
    d.className='poke-card';
    d.style.setProperty('--c',p.color);
    d.innerHTML=`<span class="pc-spr">${p.emoji}</span><span class="pc-name">${p.name}</span><span class="pc-type">${p.skills[0].type.toUpperCase()}</span><div class="pc-stat">HP ${p.hp} · Lv.${p.level}</div>`;
    if(G.chosenKey===key) d.classList.add('sel');
    d.addEventListener('click',()=>{
      document.querySelectorAll('.poke-card').forEach(c=>c.classList.remove('sel'));
      d.classList.add('sel');
      G.chosenKey=key;
      $('start-btn').disabled=false;
      saveProgress();
    });
    g.appendChild(d);
  });
  $('start-btn').disabled=!G.chosenKey;
}

$('start-btn').addEventListener('click',()=>{
  if(!G.chosenKey) return;
  G.currentStage=G.clearedStages.length;
  startBattle();
});
$('map-btn').addEventListener('click',()=>{ buildMap(); showScreen('map-screen'); });

/* ══════════════════════════════════════
   MAP SCREEN
══════════════════════════════════════ */
function buildMap(){
  const g=$('map-grid'); g.innerHTML='';
  const done=G.clearedStages.length;
  for(let i=0;i<30;i++){
    const cell=document.createElement('div');
    const isDone=G.clearedStages.includes(i);
    const isCurrent=i===done;
    const isLocked=i>done;
    const isBoss=(i===9||i===19||i===24||i===29);
    cell.className='map-cell '+(isDone?'done':isCurrent?'current':'locked');
    const enemy=ALL_ENEMIES[i];
    cell.innerHTML=`
      ${isBoss?'<span class="mc-boss">👑</span>':''}
      ${isDone?'<span class="mc-check">✅</span>':''}
      <div class="mc-num">${i+1}</div>
      <div class="mc-spr">${enemy.emoji}</div>
      <div class="mc-name">${enemy.name}</div>
    `;
    if(isCurrent){
      cell.addEventListener('click',()=>{
        G.currentStage=i;
        startBattle();
        showScreen('battle-screen');
      });
    }
    g.appendChild(cell);
  }
  $('map-sub').textContent=`Đã qua ${done}/30 cửa ải`;
}

$('map-play-btn').addEventListener('click',()=>{
  if(!G.chosenKey){showScreen('select-screen');return;}
  G.currentStage=G.clearedStages.length;
  startBattle();
  showScreen('battle-screen');
});
$('map-sel-btn').addEventListener('click',()=>{ buildSelect(); showScreen('select-screen'); });

/* ══════════════════════════════════════
   START BATTLE
══════════════════════════════════════ */
function startBattle(){
  const p=PLAYER_POKEMON[G.chosenKey];
  const eBase=buildEnemyForStage(G.currentStage);
  G.player=p; G.enemy=eBase;
  G.pHP=p.hp; G.eHP=eBase.hp;
  G.pMaxHP=p.hp; G.eMaxHP=eBase.hp;
  G.pPP=p.skills.map(s=>s.pp);
  G.turn='player';

  $('p-spr').textContent=p.emoji; $('e-spr').textContent=eBase.emoji;
  $('p-name').textContent=p.name; $('e-name').textContent=eBase.name;
  $('p-lv').textContent=`Lv.${p.level}`; $('e-lv').textContent=`Lv.${eBase.level}`;
  $('p-spr').className='poke-spr player'; $('e-spr').className='poke-spr enemy';
  $('p-spr').style.opacity=''; $('e-spr').style.opacity='';
  $('result-ov').classList.remove('show');
  $('next-btn').style.display='';

  const isBoss=(G.currentStage===9||G.currentStage===19||G.currentStage===24||G.currentStage===29);
  $('stage-badge').textContent=`${isBoss?'👑 BOSS — ':''}Cửa ${G.currentStage+1}/30`;
  $('stage-badge').style.borderColor=isBoss?'#FF8C00':'var(--yellow)';
  $('stage-badge').style.color=isBoss?'#FF8C00':'var(--yellow)';

  updateHP(); buildSkills();
  msg(`${eBase.name} (Cửa ${G.currentStage+1}) xuất hiện!`);
  showScreen('battle-screen');
}

/* ══════════════════════════════════════
   HP
══════════════════════════════════════ */
function updateHP(){
  const pP=Math.max(0,G.pHP/G.pMaxHP*100);
  const eP=Math.max(0,G.eHP/G.eMaxHP*100);
  const col=p=>p>50?'var(--hp-green)':p>20?'var(--hp-yellow)':'var(--hp-red)';
  const pb=$('p-hp-bar'),eb=$('e-hp-bar');
  pb.style.width=pP+'%'; pb.style.background=col(pP);
  eb.style.width=eP+'%'; eb.style.background=col(eP);
  $('p-hp-num').textContent=`${Math.max(0,G.pHP)}/${G.pMaxHP}`;
  $('e-hp-num').textContent=`${Math.max(0,G.eHP)}/${G.eMaxHP}`;
}

/* ══════════════════════════════════════
   SKILLS
══════════════════════════════════════ */
function buildSkills(){
  const g=$('skills-grid'); g.innerHTML='';
  G.player.skills.forEach((sk,i)=>{
    const b=document.createElement('button');
    b.className=`sk-btn type-${sk.type}`;
    b.id=`sb${i}`;
    b.innerHTML=`<span class="sn">${sk.emoji} ${sk.name}</span><span class="sp">PP ${G.pPP[i]}/${sk.pp}</span>`;
    b.addEventListener('click',()=>playerTurn(i));
    g.appendChild(b);
  });
}
function refreshSkills(){
  G.player.skills.forEach((_,i)=>{
    const b=$(`sb${i}`);
    if(b) b.querySelector('.sp').textContent=`PP ${G.pPP[i]}/${G.player.skills[i].pp}`;
  });
}
function lockSkills(v){
  G.player.skills.forEach((_,i)=>{
    const b=$(`sb${i}`);
    if(b) b.disabled=v||G.pPP[i]<=0;
  });
}

/* ══════════════════════════════════════
   MESSAGE
══════════════════════════════════════ */
function msg(t){$('msg-txt').textContent=t;}

/* ══════════════════════════════════════
   ANIMATION
══════════════════════════════════════ */
function animSpr(id,cls,dur){
  return new Promise(res=>{
    const el=$(id);
    const base=id==='e-spr'?'poke-spr enemy':'poke-spr player';
    el.className=base+' '+cls;
    setTimeout(()=>{el.className=base;res();},dur);
  });
}
function flash(color){
  const el=$('skill-fx');
  el.style.background=color; el.classList.remove('flash');
  void el.offsetWidth; el.classList.add('flash');
}
function particles(emoji,x,y,n=5){
  const f=$('battle-field');
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='ptcl';
    const a=Math.random()*Math.PI*2, d=38+Math.random()*55;
    p.style.cssText=`left:${x}%;top:${y}%;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;--dur:${.45+Math.random()*.45}s;--dly:${Math.random()*.18}s`;
    p.textContent=emoji; f.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}
function dmgPop(dmg,isPlayer,crit){
  const f=$('battle-field'),p=document.createElement('div');
  p.className=`dmg-pop ${isPlayer?'p':'e'}`;
  p.textContent=`-${dmg}`; f.appendChild(p);
  if(crit){
    const c=document.createElement('div');
    c.className=`crit-pop ${isPlayer?'p':'e'}`;
    c.textContent='CRITICAL!'; f.appendChild(c);
    setTimeout(()=>c.remove(),1100);
  }
  setTimeout(()=>p.remove(),1300);
}

/* ══════════════════════════════════════
   COMBAT
══════════════════════════════════════ */
async function playerTurn(idx){
  if(G.turn!=='player') return;
  const sk=G.player.skills[idx];
  if(G.pPP[idx]<=0) return;
  G.turn='busy'; lockSkills(true);
  G.pPP[idx]--; refreshSkills();
  const isCrit=Math.random()<0.1;
  msg(`${G.player.name} dùng ${sk.name}!${isCrit?' Critical hit!':''}`);
  await animSpr('p-spr','atk',340);
  flash(sk.fx+'99'); particles(sk.emoji,65,26,6);
  let dmg=rnd(...sk.dmg);
  if(isCrit) dmg=Math.round(dmg*1.5);
  G.eHP=Math.max(0,G.eHP-dmg);
  dmgPop(dmg,false,isCrit);
  await animSpr('e-spr','shake',400);
  updateHP(); await wait(520);
  if(G.eHP<=0){await animSpr('e-spr','faint',650);await wait(280);endBattle(true);return;}
  msg(`${G.enemy.name} chuẩn bị phản công...`);
  await wait(750); await enemyTurn();
}

async function enemyTurn(){
  const sk=G.enemy.skills[Math.floor(Math.random()*G.enemy.skills.length)];
  const isCrit=Math.random()<0.08;
  // Boss stages have higher crit chance
  const bossStage=(G.currentStage>=25);
  const finalCrit=bossStage?Math.random()<0.15:isCrit;
  msg(`${G.enemy.name} dùng ${sk.name}!${finalCrit?' Critical hit!':''}`);
  await animSpr('e-spr','atk',340);
  flash(sk.fx+'99'); particles(sk.emoji,25,62,6);
  let dmg=rnd(...sk.dmg);
  if(finalCrit) dmg=Math.round(dmg*1.5);
  G.pHP=Math.max(0,G.pHP-dmg);
  dmgPop(dmg,true,finalCrit);
  await animSpr('p-spr','shake',400);
  updateHP(); await wait(520);
  if(G.pHP<=0){await animSpr('p-spr','faint',650);await wait(280);endBattle(false);return;}
  msg(`${G.player.name} còn ${G.pHP} HP. Chọn skill!`);
  G.turn='player'; lockSkills(false);
}

/* ══════════════════════════════════════
   END BATTLE
══════════════════════════════════════ */
function endBattle(won){
  G.turn='busy';
  const rt=$('res-txt'),rs=$('res-sub');
  const isBoss=(G.currentStage===9||G.currentStage===19||G.currentStage===24||G.currentStage===29);
  if(won){
    // mark cleared
    if(!G.clearedStages.includes(G.currentStage)){
      G.clearedStages.push(G.currentStage);
      saveProgress();
    }
    rt.textContent='🏆 YOU WIN!'; rt.className='res-txt win';
    const stageNum=G.currentStage+1;
    $('stage-clear-txt').textContent=isBoss?`👑 BOSS CỬA ${stageNum} ĐÃ BẠI!`:`✅ Cửa ${stageNum} hoàn thành!`;
    rs.textContent=`${G.player.name} chiến thắng!\nĐã qua ${G.clearedStages.length}/30 cửa.`;

    // check if all done
    if(G.clearedStages.length>=30){
      $('next-btn').style.display='none';
      rs.textContent+='\n🌟 BẠN ĐÃ CHINH PHỤC TẤT CẢ!';
      setTimeout(()=>showScreen('win-screen'),2500);
    } else {
      $('next-btn').style.display='';
    }
  } else {
    rt.textContent='💀 YOU LOSE...'; rt.className='res-txt lose';
    $('stage-clear-txt').textContent='';
    rs.textContent=`${G.player.name} đã ngã xuống...\nHãy thử lại cửa ${G.currentStage+1}!`;
  }
  $('result-ov').classList.add('show');
}

/* buttons */
$('next-btn').addEventListener('click',()=>{
  if(G.currentStage<29){
    G.currentStage=G.clearedStages.length;
    startBattle();
  } else {
    showScreen('win-screen');
  }
});
$('retry-btn').addEventListener('click',()=>startBattle());
$('back-sel-btn').addEventListener('click',()=>{buildSelect();showScreen('select-screen');});

/* win screen */
$('win-restart').addEventListener('click',()=>{
  G.clearedStages=[]; G.currentStage=0;
  saveProgress();
  buildSelect(); showScreen('select-screen');
});

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
mkStars();
loadProgress();
buildSelect();

// iOS no double-tap zoom
document.addEventListener('touchend',e=>{
  if(e.target.closest('button,.poke-card,.map-cell')) e.preventDefault();
},{passive:false});
</script>
